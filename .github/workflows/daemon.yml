name: daemon
on:
  schedule:
    - cron: "0 0 1 1 *"
  repository_dispatch:
    types: [trigger]
  workflow_dispatch:
jobs:
  cycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 20
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: configure git + gpg signing
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          git config user.name "${{ github.repository_owner }}"
          git config user.email "${{ github.repository_owner }}@users.noreply.github.com"
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "$GPG_PRIVATE_KEY" | gpg --batch --import
            git config commit.gpgsign true
            git config user.signingkey "$GPG_KEY_ID"
            echo "gpg signing enabled"
          else
            echo "no gpg key â€” commits will be unsigned"
          fi
      - name: install dependencies
        run: |
          npm ci --ignore-scripts
          npm install -g @bankr/cli
      - name: run agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          VENICE_API_KEY: ${{ secrets.VENICE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          DAEMON_WALLET_KEY: ${{ secrets.DAEMON_WALLET_KEY }}
          BASE_RPC: ${{ secrets.BASE_RPC }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          NEYNAR_API_KEY: ${{ secrets.NEYNAR_API_KEY }}
          NEYNAR_SIGNER_UUID: ${{ secrets.NEYNAR_SIGNER_UUID }}
          BANKR_API_KEY: ${{ secrets.BANKR_API_KEY }}
        run: node agent/run.js


